services:
  - type: web
    name: plant-disease-api
    env: python
    region: oregon
    buildCommand: pip install -r backend/requirements-deploy.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.app.main:app --bind 0.0.0.0:$PORT

    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "https://plant-disease-detection-hazel-xi.vercel.app,https://plant-disease-detection-dbda68o61-gravitycomedia-8544s-projects.vercel.app,http://localhost:5173"

      - key: LOG_LEVEL
        value: info
      - key: MODEL_PATH
        value: app/models/plant_disease_extended.pth
      - key: HF_REPO_ID
        value: VishnuK6/PDD
      - key: HF_MODEL_FILE
        value: plant_disease_extended.pth
      - key: HF_LABELS_FILE
        value: class_names.json
      - key: PYTHON_VERSION
        value: "3.11.10"

